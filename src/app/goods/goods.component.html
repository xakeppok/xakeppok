<section class="goods">
  <div *ngFor = "let goods of goodsPage.goods; let i = index" class="good">
    <img src="{{goods.img}}" alt="">
    <h1>{{goods.name}}</h1>
    <p>{{goods.article}}</p>
    <p>Бренд <b>{{goods.brand}}</b></p>
    <p><b>Цена:{{goods.price}}</b></p>
    <button (click)="pushInToCart(i)">Заказать</button>
  </div>
  
</section>
